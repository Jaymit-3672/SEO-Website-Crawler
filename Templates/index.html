<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SEO Website Crawler</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f8fafc;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:700px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#2563eb;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            border:1px solid #ddd;
            border-radius:8px;
            margin-bottom:20px;
            font-size:16px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        /* Loading Screen */

        #loading-screen{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:white;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        .loader-box{
            text-align:center;
        }

        .spinner{
            width:80px;
            height:80px;

            border:8px solid #ddd;
            border-top:8px solid #2563eb;

            border-radius:50%;

            animation:spin 1s linear infinite;

            margin:auto;
            margin-bottom:20px;
        }

        @keyframes spin{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

    </style>

</head>

<body>

<div class="container">

    <h1>SEO Website Crawler</h1>

    <p>
        Crawl websites and discover SEO issues automatically.
    </p>

    <form action="/crawl" method="POST">

        <input
            type="text"
            name="url"
            placeholder="https://example.com"
            required
        >

        <button type="submit">
            Start Crawl
        </button>

    </form>

</div>

<!-- Loading Screen -->

<div id="loading-screen">

    <div class="loader-box">

        <div class="spinner"></div>

        <h2>Crawling Website...</h2>

        <br>

        <p>
            Analyzing pages and collecting SEO data.
        </p>

    </div>

</div>

<script>

document.querySelector("form")
.addEventListener(
    "submit",
    function(){

        document.getElementById(
            "loading-screen"
        ).style.display = "flex";

    }
);

</script>

</body>
</html>
